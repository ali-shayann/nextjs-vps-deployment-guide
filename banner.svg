<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#5b4fcf;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#5b4fcf;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#e8650a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e8650a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#glow1)"/>
  <rect width="900" height="280" fill="url(#glow2)"/>

  <!-- Top tag pill -->
  <rect x="375" y="38" width="150" height="26" rx="13" fill="#5b4fcf" fill-opacity="0.4" stroke="#5b4fcf" stroke-opacity="0.6" stroke-width="1"/>
  <text x="450" y="56" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b9ff" letter-spacing="2">DEV TUTORIAL</text>

  <!-- Title -->
  <text x="450" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#ffffff">How to Deploy a</text>
  <text x="450" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#f4a261">Next.js App</text>
  <text x="450" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#ffffff">on a VPS with Apache</text>

  <!-- Subtitle -->
  <text x="450" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#a8b2d0">A no-fluff, beginner-friendly guide using PM2, cPanel, and a proper reverse proxy</text>

  <!-- Meta row -->
  <text x="310" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#7080a0">5 min read</text>
  <text x="355" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#3a4060">·</text>
  <text x="400" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#7080a0">DevOps</text>
  <text x="445" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#3a4060">·</text>
  <text x="490" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#7080a0">Next.js</text>
  <text x="535" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#3a4060">·</text>
  <text x="580" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#7080a0">Apache</text>
</svg>
